{% extends "base.html" %}

{% block title %}
Реєстрація
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header text-center">

                <h2>
                    📝 Реєстрація
                </h2>

            </div>

            <div class="card-body">

                <form
                    id="registerForm"
                    method="post">

                    <div class="mb-3">

                        <label class="form-label">

                            Ім'я користувача

                        </label>

                        <input
                            type="text"
                            id="username"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            id="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Пароль

                        </label>

                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        Зареєструватися

                    </button>

                </form>

                <hr>

                <div class="text-center">

                    <a href="/login">

                        Уже є акаунт?
                        Увійти

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='/js/register.js') }}"></script>
{% endblock %}

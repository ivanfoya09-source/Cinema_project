{% extends "base.html" %}

{% block title %}
Вхід
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header text-center">
                <h2>🔐 Вхід</h2>
            </div>

            <div class="card-body">

                <form id="loginForm" method="post">

                    <div class="mb-3">
                        <label class="form-label">Email</label>

                        <input
                            type="email"
                            id="email"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Пароль</label>

                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            required>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Увійти

                    </button>

                </form>

                <hr>

                <div class="text-center">
                    <a href="/register">
                        Немає акаунта? Зареєструватися
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='/js/login.js') }}"></script>
{% endblock %}

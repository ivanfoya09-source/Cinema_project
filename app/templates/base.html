<!DOCTYPE html>
<html lang="uk">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            Cinema
        {% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', path='/css/style.css') }}">

    {% block styles %}
    {% endblock %}

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="/">
            🎬 Cinema
        </a>

        <button
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#navbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div
            class="collapse navbar-collapse"
            id="navbar">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="/">
                        Головна
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/movies">
                        Фільми
                    </a>
                </li>

            </ul>

            <ul class="navbar-nav">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/login">
                        Увійти
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/register">
                        Реєстрація
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="/profile">

                        Профіль

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="/admin">

                         Адмін

                    </a>

                </li>

                <li class="nav-item">

                    <a
                        href="#"
                        id="logoutButton"
                        class="nav-link">

                        Вийти

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<footer class="bg-dark text-light mt-5">

    <div class="container py-4 text-center">

        <h5>🎬 Cinema</h5>

        <p>

            © 2026 Cinema Project

        </p>

    </div>

</footer>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
</script>

<script
src="{{ url_for('static', path='/js/main.js') }}">
</script>

{% block scripts %}
{% endblock %}


</body>

</html>
